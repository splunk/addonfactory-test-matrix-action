name: "test-bypass-89092"
on:
  push:
    branches:
      - "test/verify-bypass-89092"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.SA_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.SA_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: Create throwaway commit and PR
        id: create
        run: |
          git config --global user.email ${{ secrets.GH_USER_EMAIL }}
          git config --global user.name ${{ secrets.GH_USER_ADMIN }}
          git config --global commit.gpgsign true

          BRANCH_NAME="test/bypass-probe-$GITHUB_RUN_ID"
          git checkout -b "$BRANCH_NAME"
          echo "probe $GITHUB_RUN_ID" >> BYPASS_PROBE.tmp
          git add BYPASS_PROBE.tmp
          git commit -m "test: bypass probe (ADDON-89092 verification, safe to delete)"
          git push --set-upstream origin "$BRANCH_NAME"

          PR_URL=$(gh pr create --title "test: bypass probe (ADDON-89092, will be closed)" \
            --body "Throwaway PR verifying whether srv-rr-github-token's bypass_pull_request_allowances lets GH_TOKEN_ADMIN merge without review. Safe to close/delete if left open." \
            --head "$BRANCH_NAME" --base main)
          PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$')
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_ADMIN }}
      - name: Inspect PR mergeable state
        id: inspect
        run: |
          sleep 15
          gh api repos/${{ github.repository }}/pulls/${{ steps.create.outputs.pr_num }} \
            --jq '{mergeable, mergeable_state, rebaseable}' | tee mergeable.json
          echo "## Mergeable state" >> "$GITHUB_STEP_SUMMARY"
          cat mergeable.json >> "$GITHUB_STEP_SUMMARY"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_ADMIN }}
      - name: Attempt merge without review
        id: merge
        run: |
          if gh api repos/${{ github.repository }}/pulls/${{ steps.create.outputs.pr_num }}/merge \
              -X PUT -f merge_method=squash > merge_result.json 2> merge_error.txt; then
            echo "result=MERGED" >> "$GITHUB_OUTPUT"
          else
            echo "result=BLOCKED" >> "$GITHUB_OUTPUT"
            cat merge_error.txt
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_ADMIN }}
      - name: Report
        run: |
          echo "## Bypass probe result: ${{ steps.merge.outputs.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "PR: ${{ steps.create.outputs.pr_url }}" >> "$GITHUB_STEP_SUMMARY"
      - name: Cleanup PR if still open
        if: always() && steps.merge.outputs.result != 'MERGED'
        run: |
          gh pr close "${{ steps.create.outputs.pr_url }}" --delete-branch || true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_ADMIN }}
